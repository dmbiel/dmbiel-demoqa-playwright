name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  packages: read

env:
  CHECKS_IMAGE: ghcr.io/${{ github.repository_owner }}/dmbiel-demoqa-playwright-checks:latest
  E2E_IMAGE: ghcr.io/${{ github.repository_owner }}/dmbiel-demoqa-playwright-e2e:latest

jobs:
  checks:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    container:
      image: ${{ env.CHECKS_IMAGE }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Link prebuilt checks dependencies
        run: |
          rm -rf node_modules
          ln -s /opt/checks-deps/node_modules node_modules

      - name: Check formatting
        run: npm run format:check

      - name: Lint code
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    container:
      image: ${{ env.E2E_IMAGE }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Link prebuilt e2e runtime dependencies
        run: |
          rm -rf node_modules
          ln -s /opt/e2e-deps/node_modules node_modules

      - name: Run Playwright tests
        run: npm test

      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
